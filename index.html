<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 15px;
        text-align: center;
        width: 400px;
        margin: auto;
      }

      .attribution a {
        color: hsl(228, 45%, 44%);
      }

      body {
        background-color: rgb(237, 226, 226);
      }

      /* styling the parent div */

      .qr-menu {
        display: flex;
        flex-direction: column;
        width: 330px;
        justify-content: center;
        align-items: center;
        margin: auto;
        margin-top: 20vh;
        border: none;
        border-radius: 10px;
        box-shadow: 0px 0px 2px white;
        background-color: white;
        text-align: center;
      }

      .qr-menu img {
        width: 300px;
        padding-top: 10px;
        border-radius: 15px;
      }

      h4 {
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        width: 300px;
      }

      p {
        font-size: 17px;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        width: 270px;
      }

      /* MEDIA QUERY FOR DIFFERENT SCREEN SIZE */
      @media screen and( max-width: 600px) {
        .qr-menu {
          display: flex;
          flex-direction: column;
          width: 300px;
          justify-content: center;
          align-items: center;
          margin: auto;
          margin-top: 10vh;
          border: none;
          border-radius: 10px;
          box-shadow: 0px 0px 2px white;
          background-color: white;
          text-align: center;
        }
      }

      .attribution {
        font-size: 15px;
        text-align: center;
        width: 300px;
        margin: auto;
      }
    </style>
  </head>

  <body>
    <div class="qr-menu">
      <main>
        <h1>QR Code</h1>
        <img src="./images/image-qr-code.png" alt="" />

        <h4>Improve your front-end skills by building projects</h4>

        <p>
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </main>
    </div>

   
    </div>
  </body>
</html>
